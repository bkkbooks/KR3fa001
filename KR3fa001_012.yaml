body:
  text: 候狀聞太史令封上效則和否則占七𢖍圖何庚切七𢖍者七規也謂規為𢖍者取其𢖍運則生規規者正圖之謂也內一𢖍徑二十三萬八千里次二𢖍徑二十七萬七千六百六十六里二百步次三𢖍徑三十一萬七千三百三十三里一百步次四𢖍徑三十五萬七千里次五𢖍徑三十九萬六千六百六十六里二百步次六𢖍徑四十三萬六千三百三十三里一百步次七𢖍徑四十七萬六千里即其徑而三之則各得其周也凡日月運行之圖周七𢖍周而六間一𢖍之間萬九千八百三十三里一百步以六𢖍乘之即夏至冬至相去十一萬九千里也青圖畫者胡卦切界也俗作畫合際上胡閣切下子例切常處昌劇切所也𨇠呈延切次也卯酉上莫飽切下以久切皆辰名也卯正東也酉正西也牽牛上輕煙切下如字牽牛北方宿也冬至日在牽牛婁盧候切婁西方宿也春分日在婁東井子郢切南方宿也夏至日在東井角訖嶽切東方宿也秋分日在角用繒慈陵切帛也呂氏兩舉切呂氏者呂氏春秋也呂不韋為秦相國集當世儒士使著所聞為十二紀八覽六論合十餘萬言備古今之事名為呂氏春秋四海呼改切呂氏春秋曰凡四海之內東西二萬八千里南北二萬六千里爾雅云九夷八狄七戎六蠻謂之四海言東西南北之數者將明車轍馬跡之所至河圖括地象亦云里數而有君長之州九阻中國之文德及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形訓云禹使大章步自東極至于西極孺亥步自北極至于南極而數皆然河圖括地象括音聒河圖括地象緯書名也淮南子並如字漢淮南王安所著之書也大章音泰人名
