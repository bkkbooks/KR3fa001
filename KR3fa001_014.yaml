body:
  text: 六間古間切兩𢖍相去之間也粗通徂五切略也放此甫兩切效也下同周髀卷下四和戶戈切調也四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所會陰陽之所和然則百物阜安草木蕃庶故曰四和阜安房缶切盛也蕃庶符𡋡切茂也易處夷益切交也蓋笠上居大切下音立覆槃上方六切下蒲官切離地力智切去也障蔽上之亮切隔也下必袂切奄也日兆月直紹切日者陽之精譬猶火光月者陰之精譬猶水光月含影故月光生於日之所照魄生於日之所蔽當日則光盈就日則明盡月稟日光而成形兆故云日兆月也魄匹陌切月之明消也康誥曰惟三月哉生魄孔安國曰三月始生魄月十六日明消而魄生楊子曰既望則終魄於東亦此意也行列胡剛切極樞春朱切爾雅曰樞謂之椳郭璞云門戶扉樞也此言極樞者取其居中而臨制四方也繩繫古詣切結也表顛多年切頂也中折之列切屈也漏盧侯切漏以銅受水刻節晝夜百刻𠷳漏中星略例曰日行有南北𠷳漏有長短然二十四氣𠷳差遲疾不同句股使然也直規中則差遲與句股數齊則差急隨辰極高下所遇不同如黃道刻漏此乃數之淺者近代且猶未曉今推黃道去極與𠷳影漏刻昏距中星四術返覆相求消息同率旋相為中以合九服之變揆度上巨癸切下大各切釋施隻切散也朝生陟遙切旦也暮獲胡麥切穫胡郭切收也葶藶上音亭下音歷薺麥在禮切正句上音政下音鉤無令離呈切使也織微思廉切細也督音篤察也分度徒固切數也經緯
  hash: sha256:8304d2a3fa36b9679aee12a065f750800ecd95e685ac64ff99d4a97de64c204e
