body:
  text: 述者乃是解釋君卿之所注出於宇文周之時以此推之則君卿者其亦魏晉之間人乎若夫乘句股朱黃之實立倍差減并之術以盡開方之妙百丗之下莫之可易則君卿者誡算學之宗師也嘉定六年癸酉十一月一日丁卯冬至承議郎權知汀州軍州兼管內權農事主管坑冶括蒼鮑浣之仲祺謹書
