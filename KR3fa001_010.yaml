body:
  text: 切單盡也馳思相吏切慮也捕影蒲故切索也掩日衣檢切覆也表間古間切隆殺所介切薄地補谷切迫也薑岌逆及切晉人也交趾音止郡名也去洛陽一萬一千里路迂雲俱切遠也潁川𢈔頃切郡名祖沖之持中切沖之宋南徐州從事史撰綴述五卷秣陵音末郡名信都芳並如字善算者也撰器準三卷虞𠠎𠰥郭切梁太史令日高圖並如字日高圖者求日高之法也求日高法先置表八尺為八萬里為袤以兩表相去二千里為廣廣袤相乘得一億六千萬里為黃甲之實以影差二寸為二千里為法除之得黃乙之袤八萬里即上與日齊此設圖之意也黃甲古狎切王城去天名曰甲黃乙億栗切日底地上至日名乙青丙補永切上天名青丙青戊莫侯切下地名青戊極者竭憶切諸言極者斥天之中極去周十萬三千里奄觀衣檢切覆也九隩於到切土可居也靡地毋被切無也斥昌石切指也緑宿息救切二十八宿也蝕乘力切日月虧曰蝕稍小侵虧如蟲草木之葉也適至施直切恰也發斂力冉切發斂還也璿璣上音旋下音機逮音逮及也有竒居冝切數之餘也易曰歸竒於扐冬至夏至觀律之數聽鐘之音律呂戌切聽他定切此謂冬夏二至合八能之士以觀律之數而聽鐘音之清濁也晉律曆志曰陰陽和則景至律氣應則灰除是故天子常以冬夏至日御前殿合八能之士陳八音聽樂均度𠷳影侯鐘律權土炭效陰陽冬至陽氣應則灰除是故樂均清影長極黃鐘通土炭輕而𢖍仰夏至陰氣應則樂均濁景短極蕤實通土炭重而𢖍低進退於先後五日之中八能各以
