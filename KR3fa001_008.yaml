body:
  text: 上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左廻焉天形南高而北下日出高故見日入下故不見天之居如倚蓋故極在人北是其證也極在天之中而今在人北所以知天之形如倚蓋也靈憲許建切靈憲張衡所述其說主於渾天重仭上直龍切下音刄入尺曰刄奧於到切逈戶頂切遠也周髀卷上甄鸞上之人切下曆官切甄鸞漢司隸校尉重述上直龍切下時律切趙𠁊旣加注釋甄鸞又從而發明故曰重述善數色具切數筭也包犧上蒲交切下虛冝切曆度徒固切而度大各切量也句股圓方圖句古侯切股公土切圓徑一而周三方徑一而匝四申圓之周而為句展方之匝而為股共結一角而邪適五乃圓方邪徑相通之率也句股圓方圖蓋以此設學者觀之思過半矣弦胡田切共結一角也率朔律切數相與也又音律竒耦上居冝切下烏口切矩倶兩切折之列切更相上古𢖍切下息羊切共盤上渠用切下蒲官切昏墊都念切下也書曰下民昏墊并𤰞政切句股之差楚佳切不齊也句股之差其數差一謂句三股四也量均力仗切為袤莫候切長也偃矩覆矩偃於憲切仰也覆敷目切俯也矩表也仰表所以望高俯表所以測深方屬地殊玉切下同滂沲上普郎切下唐何切四隤徒回切列星之宿息救切二十八宿之度也禮記月令宿離不忒是也不省息井切省寤也不省言不寤也猶言不敏也累思魯水切累重也直龍切才單德寒
