body:
  text: 周髀筭經二卷古蓋天之學也以句股之法度天地之高厚推日月之運行而得其度數其書出於商周之間自周公受之於商高周人志之謂之周髀其所從來遠矣隋書經籍志有周髀一卷趙嬰注周髀一卷甄鸞重述而唐之藝文志天文類有趙嬰注周髀一卷甄鸞注周髀一卷其曆筭類仍有李淳風注周髀筭經二卷本此一書耳至於本朝崇文緫目與夫中興館閣書目皆有周髀筭經二卷云趙君卿注甄鸞重述李淳風等注釋趙君卿名𠁊君卿其字也如是則在唐以前則有趙嬰之注而本朝以來則是趙𠁊之本所記不同意者趙嬰趙𠁊止是一人豈其字文相類轉寫之誤耶然亦當以隋唐之書為正可也文崇文緫目及李籍周髀音義皆云趙君卿不詳何代人今以序文考之有曰渾天有靈憲之文蓋天有周髀之法靈憲乃張𢖍之所作實後漢安順之丗而甄鸞之重
