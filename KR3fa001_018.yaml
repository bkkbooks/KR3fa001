body:
  text: 積後天資昔切以月後天分看小歲積分則積後天分也大歲徒蓋切大歲者十三月為一歲經嵗堅丁切經常也經嵗者通十二月十九分之七小月並如字小月者二十九日為一月大月徒蓋切大月者三十日為一月經月堅丁切經月者以十九乗周天分則經月之積合朔上曷閤切下色角切覆九敷救切蓋也下同當音璫正南方音政三十六頭並如字考靈曜曰分周天為三十六頭頭有十度九十六分之十四長日分於寅行二十四頭入於戍行十二頭短日分於辰行十二頭入於申行二十四頭此之謂也坎苦感切正北方之卦也巽蘇困切東南隅之卦也坤苦昆切西南隅之卦也離呂支切正南方之卦也艮古恨切東北隅之卦也乾渠焉切西北隅之卦也章止良切章條也十九歲為一章言餘閏盡為曆法章條也蔀薄口切蔀之言齊同日月之分也而又衆殘齊合羣數異蒲故謂之蔀四章為一蔀凡七十六歲也遂徐醉切遂者終也言五行之德一終盡極日月辰終也二十蔀為一遂凡千五百二十歲首始九切首始也言日月五星終而復始也三遂為一首凡四千五百六十歲也極如字極終也言日月星辰弦望晦朔寒暑推移萬物生育終而復始故謂之極七首為一極凡三萬一千九百二十歲也乾𨯳度徒固切乾𨯳度易緯書也周髀筭經音義
