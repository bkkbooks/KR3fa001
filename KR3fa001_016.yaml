body:
  text: 上堅丁切下于貴切南北為經東西為緯圓定正音政則復扶富切又也須女如字星名也遊儀如字遊儀所以望星也正觀中李淳風造四遊儀元樞為軸以連結玉𢖍遊筒而貫約規矩又元樞北立北辰南距地軸旁轉於內玉𢖍在元樞之間而南北遊仰以觀天之辰宿下以識器之𠷳度開元九年率府兵曹參軍梁令瓉以木為遊儀一行是之乃奏黃道遊儀古有其術而無其器昔人潛思未能得今令瓉所為日道月交皆自然契合於推步尤要請更鑄以銅十年儀成車輻方六切所以實輪而湊轂者也以圓度為輻為轂古祿切所以受輻也以經緯之交為轂二十八宿息救切副置敷救切別也別置算也下同地協檄頰切合也相應於證切參正上倉含切下音改八節並如字二至者寒暑之極二分者陰陽之和四立者生長收藏之始是為八節二十四氣並如字一歲凡八節節三氣三而八之故為二十四氣氣損益九寸九分六分分之一並如字損者減也破一分為六分然後減之益者加也加以小分滿六分得一從分冬至並如字至極也冬至夏至寒暑之極啓蟄直立切藏也易曰龍蛇之蟄以存身也左氏傳曰啓蟄而郊春分府文切分之言中也春分為陽之中秋分為陰之中芒種上莫郎切下只用切處暑昌據切所也時舍音捨不用也虛誕音但謾也一概古代切矛楯上莫浮切下食閏切矛所以句楯所以蔽器不同不相為用凡言矛楯折況其所趣異也後天並如字月後天者月東行者也此見日月與天俱西南遊一日一夜天一周而月在昨夜之東故曰月後天小歲並如字小歲者十二月為一歲故舍式夜切舍謂二十八宿之舍也
