body:
  text: 周髀算經音義假承務郎祕書省鉤考算經文字臣李籍撰周髀序周髀步米切周髀算經者以九數句股重差算日月周天行度遠近之數皆得於股表即推步蓋天職法也髀者股也以表為股周天曆度本包犧氏立法其傳自州公受之於大夫商高周人志之故曰周髀趙君卿撰難免切述也君卿趙𠁊字也不詳何代人恢苦回切大也廓頥上枯郭切下歷各切𠷳儀居洧切日影也度量上達各切下録章切探頥上吐南切下士革切頥者含畜含畜者探之可及故易曰探頥索隱上色白切下於謹切隱者隱匿隱匿者索之可得故曰索隱詭異古委切莊子曰恢詭譎詭渾天胡昆切渾天者言田地之體狀如鳥卵天包地外猶殼之裹黃也周旋無端其形渾渾然故曰渾天史官侯臺所用銅儀則其法也立八尺圓體具天地之形以正黃道占察發斂以行日月以步五緯精微深妙百代不易之道也官有其器而無本書蓋天居大切蓋天之説即周髀是也其言天似蓋笠地似覆槃天地各中高外下比極之下為天地之中其地最高而滂沱四隤三光隱映以為畫夜天中高猶於𢖍冬至日之所在六萬里北極下地高於外衡下地亦六萬里外𢖍高於北極下地二萬里天地隆高相從日去地常八萬里日麗天而平轉分冬夏之間日前行道為七𢖍六間每衡周徑里數各依算術用句股重差推𠷳影極遊以為遠近之數皆得於表股者也故曰周髀又周髀家云天圓如張蓋地蓋如棊局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西沒譬之於蟻行磨石之
